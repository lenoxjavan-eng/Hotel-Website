<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anfield Star Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Anfield Star Hotel</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="rooms.html">Rooms</a></li>
                <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>
<main class="flex-fill">
<div class="page-header">
    <div class="container text-center text-black my-5 pt-3">
        <h1>Contact Us</h1>
        <p>Book your stay or ask us any questions</p>
    </div>
</div>

<div class="container my-5">
    <div class="row">
        <!-- Contact Info -->
        <div class="col-md-4">
            <div class="card shadow p-4 mb-4">
                <h3>Address</h3>
                <p>Ngong Lane Plaza,ngong road</p>
                <hr>
                <h3>Phone</h3>
                <p>+254 722233344</p>
                <hr>
                <h3>Email</h3>
                <p>anfieldstarhotel@gmail.com</p>
                <hr>
            </div>
        </div>

        <!-- Booking Inquiry Form -->
        <div class="col-md-8">
            <div class="card shadow p-4">
                <h3>Send Us a Message</h3>
                <form>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Room Type</label>
                            <select class="form-select">
                                <option>Deluxe Room</option>
                                <option>Ocean Suite</option>
                                <option>Presidential Suite</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Check-in Date</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Check-out Date</label>
                            <input type="date" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Special Requests</label>
                        <textarea class="form-control" rows="4" placeholder="Any preferences, dietary needs, or questions..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-warning btn-lg w-100">Submit Inquiry</button>
                </form>
            </div>
        </div>
    </div>
</main>
<footer class="bg-dark text-white text-center py-4">
    <div class="container">
        <p>&copy; 2026 Anfield Star Hotel. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
